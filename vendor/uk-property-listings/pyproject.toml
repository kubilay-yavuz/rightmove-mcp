[project]
name = "uk-property-listings"
version = "0.1.0"
description = "Listings search utilities for UK property portals: SearchQuery, per-portal URL builders, a lightweight httpx-only SimpleCrawler, and pagination helpers that wire any Crawler-like object to the parsers in uk-property-scrapers."
readme = "README.md"
requires-python = ">=3.12,<3.14"
license = { text = "MIT" }
authors = [{ name = "Kubilay Yavuz" }]
keywords = ["uk", "property", "zoopla", "rightmove", "onthemarket", "listings"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet :: WWW/HTTP :: Indexing/Search",
]
dependencies = [
    "pydantic>=2.9",
    "httpx>=0.27",
    "uk-property-scrapers",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/uk_property_listings"]
