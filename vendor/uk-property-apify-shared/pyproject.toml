[project]
name = "uk-property-apify-shared"
version = "0.1.0"
description = "PRIVATE. Shared production-crawler infrastructure for UK property Apify actors: curl-cffi TLS impersonation, Playwright stealth, anti-bot classifier, rate limiter, residential-proxy glue, alert sinks, and the Actor run-loop. Not published to PyPI."
readme = "README.md"
requires-python = ">=3.12,<3.14"
license = { text = "Proprietary" }
authors = [{ name = "Kubilay Yavuz" }]

dependencies = [
    "pydantic>=2.9",
    "httpx>=0.27",
    "tenacity>=9.0",
    "uk-property-scrapers",
    "uk-property-listings",
    "uk-property-apis",
]

[project.optional-dependencies]
# Production dependencies for real anti-bot work. Actors installing the
# shared package for Apify deployment MUST install this extra.
crawler = [
    "curl-cffi>=0.7",
    "playwright>=1.47",
]
# Apify SDK used by the actor_support run-loop.
apify = [
    "apify>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/uk_property_apify_shared"]
